apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kyverno-policy-detection
  namespace: monitoring
spec:
  groups:
    - name: kyverno-policy-detection
      rules:
        - alert: KyvernoPolicyViolationDetected
          expr: sum by (policy_name, resource_namespace) (rate(kyverno_policy_results_total{rule_result="fail", resource_namespace="demo"}[5m])) > 0
          for: 2m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Kyverno policy violation detected"
            description: "Policy {{ $labels.policy_name }} has active failures in namespace {{ $labels.resource_namespace }}."

