apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged
  annotations:
    policies.kyverno.io/title: Disallow privileged containers
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod, Deployment
    policies.kyverno.io/description: >-
      Privileged containers have nearly full access to the host node.
      If an attacker exploits a CVE inside, they can break out and read
      Kubernetes certificates at /etc/kubernetes/pki.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: deny-privileged-deployment
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: demo
      validate:
        message: "Privileged containers are not allowed. Remove privileged:true and allowPrivilegeEscalation:true."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - =(securityContext):
                      =(privileged): false
                      =(allowPrivilegeEscalation): false

    - name: deny-privileged-pod
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: demo
      validate:
        message: "Privileged containers are not allowed. Remove privileged:true and allowPrivilegeEscalation:true."
        pattern:
          spec:
            containers:
              - =(securityContext):
                  =(privileged): false
                  =(allowPrivilegeEscalation): false
